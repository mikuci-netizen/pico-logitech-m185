name: Build UF2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup ARM GCC
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi cmake build-essential libnewlib-arm-none-eabi git

      - name: Setup Pico SDK
        run: |
          git clone https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk
          git submodule update --init

      - name: Setup TinyUSB
        run: |
          git clone https://github.com/hathach/tinyusb.git

      - name: Build firmware
        run: |
          mkdir build
          cd build
          cmake .. -DPICO_SDK_PATH=../pico-sdk -DTINYUSB_PATH=../tinyusb
          make -j4

      - name: Upload UF2
        uses: actions/upload-artifact@v3
        with:
          name: pico-firmware
          path: build/*.uf2
          